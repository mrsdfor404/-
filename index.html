<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الطلبات - سحابة خاصة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* بطاقة التحكم */
        .dashboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* نموذج الإضافة */
        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        input, select, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        /* الإحصائيات */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* جدول الطلبات */
        .orders-table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* شارة الحالة */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-new { background: #ffc107; color: #333; }
        .status-progress { background: #17a2b8; color: white; }
        .status-delivered { background: #28a745; color: white; }
        .status-cancelled { background: #dc3545; color: white; }

        /* أزرار الإجراءات */
        .action-btn {
            padding: 5px 10px;
            margin: 0 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .edit-btn {
            background: #ffc107;
            color: #333;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .save-btn {
            background: #28a745;
            color: white;
        }

        /* نموذج التعديل */
        .edit-form {
            display: inline-flex;
            gap: 5px;
        }

        .edit-input {
            width: 100px;
            padding: 5px;
            font-size: 12px;
        }

        /* أزرار التحكم */
        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        /* رسائل التنبيه */
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* بحث وتصفية */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .dashboard {
                padding: 15px;
            }
            
            th, td {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard">
            <h1>📋 نظام إدارة الطلبات</h1>
            <div class="subtitle">تسجيل وتتبع الطلبات - بياناتك محفوظة محلياً</div>

            <!-- رسائل التنبيه -->
            <div id="alert" class="alert"></div>

            <!-- نموذج إضافة طلب -->
            <div class="form-section">
                <h3 style="margin-bottom: 20px;">➕ إضافة طلب جديد</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>اسم العميل *</label>
                        <input type="text" id="customerName" placeholder="أدخل اسم العميل">
                    </div>
                    <div class="form-group">
                        <label>اسم المنتج *</label>
                        <input type="text" id="productName" placeholder="أدخل اسم المنتج">
                    </div>
                    <div class="form-group">
                        <label>الكمية *</label>
                        <input type="number" id="quantity" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>السعر الإجمالي *</label>
                        <input type="number" id="totalPrice" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>الحالة</label>
                        <select id="status">
                            <option value="جديد">🟡 جديد</option>
                            <option value="قيد التنفيذ">🔵 قيد التنفيذ</option>
                            <option value="تم التسليم">🟢 تم التسليم</option>
                            <option value="ملغي">🔴 ملغي</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ملاحظات</label>
                        <textarea id="notes" rows="1" placeholder="ملاحظات إضافية"></textarea>
                    </div>
                </div>
                <button onclick="addOrder()">💾 حفظ الطلب</button>
            </div>

            <!-- الإحصائيات -->
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalOrders">0</div>
                    <div class="stat-label">إجمالي الطلبات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="newOrders">0</div>
                    <div class="stat-label">طلبات جديدة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="deliveredOrders">0</div>
                    <div class="stat-label">تم التسليم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalRevenue">0</div>
                    <div class="stat-label">إجمالي الإيرادات</div>
                </div>
            </div>

            <!-- بحث -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 بحث عن طلب (باسم العميل أو المنتج)" onkeyup="filterOrders()">
            </div>

            <!-- جدول الطلبات -->
            <div class="orders-table-wrapper">
                <table id="ordersTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>العميل</th>
                            <th>المنتج</th>
                            <th>الكمية</th>
                            <th>السعر</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>ملاحظات</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersList">
                        <tr><td colspan="9" style="text-align: center;">لا توجد طلبات</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- أزرار التحكم -->
            <div class="control-buttons">
                <button onclick="exportToCSV()" class="btn-secondary">📥 تصدير إلى Excel/CSV</button>
                <button onclick="deleteAllOrders()" class="btn-danger">🗑️ حذف جميع الطلبات</button>
            </div>
        </div>
    </div>

    <script>
        // تهيئة البيانات
        let orders = [];
        let editingId = null;

        // تحميل البيانات من LocalStorage
        function loadOrders() {
            const stored = localStorage.getItem('orders');
            if (stored) {
                orders = JSON.parse(stored);
            } else {
                // بيانات تجريبية
                orders = [
                    {
                        id: 1,
                        customerName: 'أحمد محمد',
                        productName: 'منتج 1',
                        quantity: 2,
                        totalPrice: 100,
                        status: 'جديد',
                        date: new Date().toISOString(),
                        notes: 'يرجى الاتصال قبل التسليم'
                    },
                    {
                        id: 2,
                        customerName: 'سارة علي',
                        productName: 'منتج 2',
                        quantity: 1,
                        totalPrice: 50,
                        status: 'قيد التنفيذ',
                        date: new Date().toISOString(),
                        notes: ''
                    }
                ];
                saveOrders();
            }
            renderOrders();
        }

        // حفظ البيانات في LocalStorage
        function saveOrders() {
            localStorage.setItem('orders', JSON.stringify(orders));
            updateStats();
        }

        // إضافة طلب جديد
        function addOrder() {
            const customerName = document.getElementById('customerName').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const quantity = parseInt(document.getElementById('quantity').value);
            const totalPrice = parseFloat(document.getElementById('totalPrice').value);
            const status = document.getElementById('status').value;
            const notes = document.getElementById('notes').value.trim();

            // التحقق من صحة المدخلات
            if (!customerName || !productName || !quantity || !totalPrice) {
                showAlert('الرجاء ملء جميع الحقول المطلوبة', 'error');
                return;
            }

            if (quantity <= 0 || totalPrice <= 0) {
                showAlert('الكمية والسعر يجب أن يكونا أكبر من صفر', 'error');
                return;
            }

            const newOrder = {
                id: Date.now(),
                customerName: customerName,
                productName: productName,
                quantity: quantity,
                totalPrice: totalPrice,
                status: status,
                date: new Date().toISOString(),
                notes: notes
            };

            orders.unshift(newOrder); // إضافة في البداية
            saveOrders();
            renderOrders();

            // مسح النموذج
            document.getElementById('customerName').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('quantity').value = '1';
            document.getElementById('totalPrice').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('status').value = 'جديد';

            showAlert('تم إضافة الطلب بنجاح', 'success');
        }

        // حذف طلب
        function deleteOrder(id) {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
                orders = orders.filter(order => order.id !== id);
                saveOrders();
                renderOrders();
                showAlert('تم حذف الطلب بنجاح', 'success');
            }
        }

        // حذف جميع الطلبات
        function deleteAllOrders() {
            if (confirm('⚠️ تحذير: هذا سيحذف جميع الطلبات نهائياً! هل أنت متأكد؟')) {
                orders = [];
                saveOrders();
                renderOrders();
                showAlert('تم حذف جميع الطلبات', 'success');
            }
        }

        // بدء التعديل
        function startEdit(id) {
            editingId = id;
            renderOrders(); // إعادة عرض الجدول مع حقول التعديل
        }

        // حفظ التعديل
        function saveEdit(id) {
            const newCustomerName = document.getElementById(`edit_customer_${id}`).value;
            const newProductName = document.getElementById(`edit_product_${id}`).value;
            const newQuantity = parseInt(document.getElementById(`edit_quantity_${id}`).value);
            const newTotalPrice = parseFloat(document.getElementById(`edit_price_${id}`).value);
            const newStatus = document.getElementById(`edit_status_${id}`).value;
            const newNotes = document.getElementById(`edit_notes_${id}`).value;

            const orderIndex = orders.findIndex(o => o.id === id);
            if (orderIndex !== -1) {
                orders[orderIndex] = {
                    ...orders[orderIndex],
                    customerName: newCustomerName,
                    productName: newProductName,
                    quantity: newQuantity,
                    totalPrice: newTotalPrice,
                    status: newStatus,
                    notes: newNotes
                };
                saveOrders();
            }

            editingId = null;
            renderOrders();
            showAlert('تم تحديث الطلب بنجاح', 'success');
        }

        // تغيير الحالة بسرعة
        function quickStatusChange(id, newStatus) {
            const orderIndex = orders.findIndex(o => o.id === id);
            if (orderIndex !== -1) {
                orders[orderIndex].status = newStatus;
                saveOrders();
                renderOrders();
                showAlert(`تم تغيير الحالة إلى ${newStatus}`, 'success');
            }
        }

        // تحديث الإحصائيات
        function updateStats() {
            const total = orders.length;
            const newOrders = orders.filter(o => o.status === 'جديد').length;
            const deliveredOrders = orders.filter(o => o.status === 'تم التسليم').length;
            const totalRevenue = orders.reduce((sum, o) => sum + o.totalPrice, 0);

            document.getElementById('totalOrders').textContent = total;
            document.getElementById('newOrders').textContent = newOrders;
            document.getElementById('deliveredOrders').textContent = deliveredOrders;
            document.getElementById('totalRevenue').textContent = totalRevenue.toFixed(2);
        }

        // تصفية الطلبات
        function filterOrders() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = orders.filter(order => 
                order.customerName.toLowerCase().includes(searchTerm) ||
                order.productName.toLowerCase().includes(searchTerm) ||
                order.notes.toLowerCase().includes(searchTerm)
            );
            renderOrders(filtered);
        }

        // عرض الطلبات في الجدول
        function renderOrders(ordersToRender = null) {
            const ordersList = ordersToRender || orders;
            const tbody = document.getElementById('ordersList');
            
            if (ordersList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center;">📭 لا توجد طلبات</td></tr>';
                updateStats();
                return;
            }

            tbody.innerHTML = ordersList.map(order => {
                if (editingId === order.id) {
                    // عرض نموذج التعديل
                    return `
                        <tr>
                            <td>${order.id}</td>
                            <td><input type="text" id="edit_customer_${order.id}" value="${escapeHtml(order.customerName)}" class="edit-input"></td>
                            <td><input type="text" id="edit_product_${order.id}" value="${escapeHtml(order.productName)}" class="edit-input"></td>
                            <td><input type="number" id="edit_quantity_${order.id}" value="${order.quantity}" class="edit-input" style="width: 70px;"></td>
                            <td><input type="number" id="edit_price_${order.id}" value="${order.totalPrice}" class="edit-input" style="width: 100px;"></td>
                            <td>
                                <select id="edit_status_${order.id}" class="edit-input">
                                    <option ${order.status === 'جديد' ? 'selected' : ''}>جديد</option>
                                    <option ${order.status === 'قيد التنفيذ' ? 'selected' : ''}>قيد التنفيذ</option>
                                    <option ${order.status === 'تم التسليم' ? 'selected' : ''}>تم التسليم</option>
                                    <option ${order.status === 'ملغي' ? 'selected' : ''}>ملغي</option>
                                </select>
                            </td>
                            <td>${new Date(order.date).toLocaleDateString('ar-EG')}</td>
                            <td><input type="text" id="edit_notes_${order.id}" value="${escapeHtml(order.notes)}" class="edit-input" style="width: 120px;"></td>
                            <td>
                                <button class="action-btn save-btn" onclick="saveEdit(${order.id})">💾 حفظ</button>
                                <button class="action-btn delete-btn" onclick="cancelEdit()">❌ إلغاء</button>
                            </td>
                        </tr>
                    `;
                } else {
                    // عرض عادي
                    const statusClass = order.status === 'جديد' ? 'status-new' :
                                       order.status === 'قيد التنفيذ' ? 'status-progress' :
                                       order.status === 'تم التسليم' ? 'status-delivered' : 'status-cancelled';
                    
                    return `
                        <tr>
                            <td>${order.id}</td>
                            <td>${escapeHtml(order.customerName)}</td>
                            <td>${escapeHtml(order.productName)}</td>
                            <td>${order.quantity}</td>
                            <td>${order.totalPrice} $</td>
                            <td>
                                <span class="status-badge ${statusClass}">${order.status}</span>
                                <br>
                                <select onchange="quickStatusChange(${order.id}, this.value)" style="margin-top: 5px; font-size: 11px; padding: 3px;">
                                    <option>جديد</option>
                                    <option>قيد التنفيذ</option>
                                    <option>تم التسليم</option>
                                    <option>ملغي</option>
                                </select>
                            </td>
                            <td>${new Date(order.date).toLocaleDateString('ar-EG')}<br><small>${new Date(order.date).toLocaleTimeString('ar-EG')}</small></td>
                            <td><small>${escapeHtml(order.notes) || '-'}</small></td>
                            <td>
                                <button class="action-btn edit-btn" onclick="startEdit(${order.id})">✏️ تعديل</button>
                                <button class="action-btn delete-btn" onclick="deleteOrder(${order.id})">🗑️ حذف</button>
                            </td>
                        </tr>
                    `;
                }
            }).join('');
            
            updateStats();
        }

        // إلغاء التعديل
        function cancelEdit() {
            editingId = null;
            renderOrders();
        }

        // تصدير إلى CSV
        function exportToCSV() {
            if (orders.length === 0) {
                showAlert('لا توجد بيانات للتصدير', 'error');
                return;
            }

            const headers = ['ID', 'العميل', 'المنتج', 'الكمية', 'السعر', 'الحالة', 'التاريخ', 'الملاحظات'];
            const rows = orders.map(order => [
                order.id,
                order.customerName,
                order.productName,
                order.quantity,
                order.totalPrice,
                order.status,
                new Date(order.date).toLocaleString('ar-EG'),
                order.notes
            ]);

            const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `الطلبات_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showAlert('تم تصدير البيانات بنجاح', 'success');
        }

        // عرض رسالة
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // منع XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // تحميل الصفحة
        loadOrders();
    </script>
</body>
</html>
